# Runs the banner-script Python test suite on every PR and on push to main.
# Scoped via paths filter so it only fires when the banner project or this workflow changes.
name: Python tests

on:
  pull_request:
    paths:
      - 'scripts/social-banner/**'
      - '.github/workflows/python-tests.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/social-banner/**'
      - '.github/workflows/python-tests.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install uv
        # pin to SHA later if desired
        uses: astral-sh/setup-uv@v4
      - name: Install deps
        run: uv sync --frozen --extra dev
        working-directory: scripts/social-banner
      - name: Run tests
        run: uv run pytest tests/ -v
        working-directory: scripts/social-banner
