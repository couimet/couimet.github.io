- date: "2026-05-21"
  title: I sold you on /scratchpad. Then I migrated to /note.
  link: https://dev.to/couimet/i-sold-you-on-scratchpad-then-i-migrated-to-note-4n1o
  anchor: scratchpad-to-note
  sources:
    - couimet/my-claude-skills/media/2026-05-devto-post-from-scratchpad-to-note.md
    - couimet/my-claude-skills/media/2026-05-devto-post-from-scratchpad-to-note-workflow-diagram.md
    - couimet/my-claude-skills/media/2026-05-devto-post-from-scratchpad-to-note-workflow-diagram.png
  projects:
    - my-claude-skills
  promotion:
    linkedin:
      url: https://www.linkedin.com/feed/update/urn:li:activity:7463240605780074496/
      content: |
        I thought I was building good AI engineering hygiene.

        I may also have been accidentally DOS-ing my token budget with my own process.

        My original Claude Code workflow used structured /scratchpad files with step tracking, status fields, dependency arrays, and checkpointed execution.

        I migrated most of the workflow to a much lighter /note format instead: same planning step, far less ceremony.

        Wrote about the migration and what changed my mind:

        https://lnkd.in/eevaRd66

