  promotion:
    linkedin:
      url: https://www.linkedin.com/feed/update/urn:li:activity:7471367701467336704/
      content: |
        RangeLink 2.0.0 is out 🚀

        In v1, a destination was where R-L sent your link. In v2, a destination carries the whole R-* family — link, selection, file path, terminal output, all routed through one thing you bind once.

        (And v2 also stops stomping on your system clipboard. About time 😅)

        👉 https://dev.to/couimet/rangelink-200-bind-first-every-r-follows-11nd
    x:
      url: https://x.com/charlesouimet/status/2065604304933716368
      content: |
        RangeLink 2.0.0 🚀

        • Every R-* keybinding now routes through one bound destination
        • R-V also sends terminal selections
        • Your clipboard finally stays yours

        https://dev.to/couimet/rangelink-200-bind-first-every-r-follows-11nd

