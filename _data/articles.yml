- date: "2026-06-12"
  title: "RangeLink 2.0.0: Bind first. Every R-* follows"
  link: https://dev.to/couimet/rangelink-200-bind-first-every-r-follows-11nd
  anchor: rangelink-v2
  sources:
    - couimet/rangeLink/media/devto-post-vscode-extension-v2.0.0.md
